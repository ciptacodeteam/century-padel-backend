services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: quantum-sport-db-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-quantum_sport}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: '-E UTF8'
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-quantum_sport}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - quantum-sport-network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'
    security_opt:
      - no-new-privileges:true
    shm_size: 256mb

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: quantum-sport-redis-prod
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quantum-sport-network
    command: redis-server /usr/local/etc/redis/redis.conf
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    security_opt:
      - no-new-privileges:true

  # Application Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    image: quantum-sport-backend:latest
    container_name: quantum-sport-app-prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-quantum_sport}?schema=public&connection_limit=10&pool_timeout=20
      REDIS_URL: redis://redis:6379
    ports:
      - '${PORT:-3000}:3000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quantum-sport-network
    volumes:
      - app_storage:/app/storage
    healthcheck:
      test: ['CMD', 'bun', 'run', '--bun', '/app/dist/healthcheck.js']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
        max-file: '10'
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Email Queue Worker
  email-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    image: quantum-sport-backend:latest
    container_name: quantum-sport-email-worker-prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-quantum_sport}?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quantum-sport-network
    command: ['bun', 'run', './dist/src/workers/email.worker.js']
    logging:
      driver: 'json-file'
      options:
        max-size: '20m'
        max-file: '5'
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Nginx Reverse Proxy (Optional but recommended)
  # NOTE: If you have system nginx running on port 80, either:
  # 1. Stop system nginx: sudo systemctl stop nginx
  # 2. Or comment out this service and configure system nginx to proxy to the app
  # 3. Or change the port mapping (e.g., '8080:80')
  nginx:
    image: nginx:alpine
    container_name: quantum-sport-nginx-prod
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - quantum-sport-network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_storage:
    driver: local
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local

networks:
  quantum-sport-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
