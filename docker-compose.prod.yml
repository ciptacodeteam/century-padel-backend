services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: quantum-sport-db-prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${DB_NAME:-quantum_sport}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_INITDB_ARGS: '-E UTF8'
    # Port exposed for external access (e.g., pgAdmin)
    # For security, consider restricting access via firewall or use SSH tunnel
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - quantum-sport-network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'
    security_opt:
      - no-new-privileges:true
    shm_size: 512mb

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: quantum-sport-redis-prod
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - quantum-sport-network
    command: redis-server /usr/local/etc/redis/redis.conf
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    security_opt:
      - no-new-privileges:true

  # Application Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: quantum-sport-backend:latest
    container_name: quantum-sport-app-prod
    restart: unless-stopped
    shm_size: '512mb'
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: ${PORT:-8000}
      # Construct DATABASE_URL using variables from .env.production
      # Increased connection limit for 4GB RAM
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/${DB_NAME:-quantum_sport}?schema=public&connection_limit=20&pool_timeout=20
      REDIS_URL: redis://redis:6379
    ports:
      - '${PORT:-8000}:${PORT:-8000}'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quantum-sport-network
    volumes:
      - app_storage:/app/storage
      # Make storage writable (override read_only for this path)
      - type: tmpfs
        target: /app/.bun
    healthcheck:
      test: ['CMD', 'bun', 'run', '--bun', '/app/dist/src/healthcheck.js']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
        max-file: '10'
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Email Queue Worker
  email-worker:
    image: quantum-sport-backend:latest
    container_name: quantum-sport-email-worker-prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      # Increased connection limit for 4GB RAM
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/${DB_NAME:-quantum_sport}?schema=public&connection_limit=10
      REDIS_URL: redis://redis:6379
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quantum-sport-network
    command: ['bun', '--bun', './dist/src/workers/email.worker.js']
    logging:
      driver: 'json-file'
      options:
        max-size: '20m'
        max-file: '5'
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Scheduler Worker (Transaction Expiry Checker)
  scheduler-worker:
    image: quantum-sport-backend:latest
    container_name: quantum-sport-scheduler-worker-prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      # Increased connection limit for 4GB RAM
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/${DB_NAME:-quantum_sport}?schema=public&connection_limit=10
      REDIS_URL: redis://redis:6379
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quantum-sport-network
    command: ['bun', '--bun', './dist/src/workers/scheduler.worker.js']
    logging:
      driver: 'json-file'
      options:
        max-size: '20m'
        max-file: '5'
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Nginx Reverse Proxy (Optional but recommended)
  # NOTE: If you have system nginx running on port 80, either:
  # 1. Stop system nginx: sudo systemctl stop nginx
  # 2. Or comment out this service and configure system nginx to proxy to the app
  # 3. Or change the port mapping (e.g., '8080:80')
  nginx:
    image: nginx:alpine
    container_name: quantum-sport-nginx-prod
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
      # Let's Encrypt SSL certificates
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - quantum-sport-network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    security_opt:
      - no-new-privileges:true
  
  # Certbot for SSL certificate management
  certbot:
    image: certbot/certbot:latest
    container_name: quantum-sport-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - quantum-sport-network

  # Prisma Studio (Database GUI) - Only start when needed
  # Usage: docker-compose -f docker-compose.prod.yml up -d prisma-studio
  # Access at: http://localhost:5555 (or your server IP:5555)
  # Security: Consider restricting access via firewall or nginx
  # prisma-studio:
  #   image: quantum-sport-backend:latest
  #   container_name: quantum-sport-prisma-studio-prod
  #   restart: "no"  # Don't auto-restart, start manually when needed
  #   working_dir: /app
  #   env_file:
  #     - .env.production
  #   environment:
  #     NODE_ENV: production
  #     DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/${DB_NAME:-quantum_sport}?schema=public
  #   ports:
  #     - '${PRISMA_STUDIO_PORT:-5555}:5555'
  #   volumes:
  #     # Mount prisma directory for schema access
  #     - ./prisma:/app/prisma:ro
  #     # Mount node_modules from the image (already installed)
  #     - /app/node_modules
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   networks:
  #     - quantum-sport-network
  #   command: ['bunx', 'prisma', 'studio', '--port', '5555', '--browser', 'none']
  #   logging:
  #     driver: 'json-file'
  #     options:
  #       max-size: '10m'
  #       max-file: '3'
  #   security_opt:
  #     - no-new-privileges:true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_storage:
    driver: local
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local

networks:
  quantum-sport-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
