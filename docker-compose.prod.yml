services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: century-padel-db-prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${DB_NAME:-century_padel}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_INITDB_ARGS: '-E UTF8'
    # Port exposed for external access (e.g., pgAdmin)
    # For security, consider restricting access via firewall or use SSH tunnel
    # Maps host port (from DB_PORT env var) to container port 5432
    ports:
      - '${DB_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - century-padel-network
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'
    security_opt: ['no-new-privileges:true']
    shm_size: 256mb
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: century-padel-redis-prod
    restart: unless-stopped
    env_file:
      - .env.production
    # SECURITY: Do NOT expose Redis port publicly (commented out)
    # Redis should ONLY be accessible from internal Docker network
    # ports:
    #   - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - century-padel-network
    command: redis-server /usr/local/etc/redis/redis.conf
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    security_opt: ['no-new-privileges:true']
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # Application Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: century-padel-backend:latest
    container_name: century-padel-app-prod
    restart: unless-stopped
    shm_size: '512mb'
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: ${PORT:-8000}
      # Construct DATABASE_URL using variables from .env.production
      # Reduced connection limit for 2GB RAM
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/${DB_NAME:-century_padel}?schema=public&connection_limit=10&pool_timeout=20
      REDIS_URL: redis://redis:6379
    # Internal only — nginx is the public entrypoint (127.0.0.1 for SSH tunnel debugging)
    ports:
      - '127.0.0.1:${PORT:-8000}:${PORT:-8000}'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - century-padel-network
    volumes:
      - app_storage:/app/storage
      # Make storage writable (override read_only for this path)
      - type: tmpfs
        target: /app/.bun
    healthcheck:
      test: ['CMD', 'bun', 'run', '--bun', '/app/dist/src/healthcheck.js']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
        max-file: '10'
    security_opt: ['no-new-privileges:true']
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1280M
        reservations:
          cpus: '0.5'
          memory: 512M

  # Email Queue Worker
  email-worker:
    image: century-padel-backend:latest
    container_name: century-padel-email-worker-prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      # Reduced connection limit for 2GB RAM
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/${DB_NAME:-century_padel}?schema=public&connection_limit=5
      REDIS_URL: redis://redis:6379
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - century-padel-network
    command: ['bun', '--bun', './dist/src/workers/email.worker.js']
    healthcheck:
      test: ['CMD-SHELL', 'kill -0 1 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: 'json-file'
      options:
        max-size: '20m'
        max-file: '5'
    security_opt: ['no-new-privileges:true']
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 192M

  # Scheduler Worker (Transaction Expiry Checker)
  scheduler-worker:
    image: century-padel-backend:latest
    container_name: century-padel-scheduler-worker-prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      # Reduced connection limit for 2GB RAM
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/${DB_NAME:-century_padel}?schema=public&connection_limit=5
      REDIS_URL: redis://redis:6379
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - century-padel-network
    command: ['bun', '--bun', './dist/src/workers/scheduler.worker.js']
    healthcheck:
      test: ['CMD-SHELL', 'kill -0 1 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: 'json-file'
      options:
        max-size: '20m'
        max-file: '5'
    security_opt: ['no-new-privileges:true']
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 192M

  # Nginx reverse proxy (fully containerized — stop system nginx: sudo systemctl stop nginx)
  nginx:
    image: nginx:alpine
    container_name: century-padel-nginx-prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      SSL_DOMAIN: ${SSL_DOMAIN:-api.centurypadel.id}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/templates:/etc/nginx/templates:ro
      - ./docker/nginx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    entrypoint: ['/bin/sh', '/docker-entrypoint.sh']
    depends_on:
      app:
        condition: service_healthy
    networks:
      - century-padel-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://app:8000/health 2>/dev/null | grep -q "\"success\":true" || wget -qO- http://app:8000/health 2>/dev/null | grep -q "up"',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    security_opt: ['no-new-privileges:true']
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: '64M'

  # Certbot - webroot renewal; reloads nginx via Docker API after successful renew
  certbot:
    image: certbot/certbot:latest
    container_name: century-padel-certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/certbot-entrypoint.sh:/certbot-entrypoint.sh:ro
    entrypoint: ['/bin/sh', '/certbot-entrypoint.sh']
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - century-padel-network
    healthcheck:
      test: ['CMD-SHELL', 'kill -0 1']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt: ['no-new-privileges:true']
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: '64M'

  # Prisma Studio (Database GUI) - Only start when needed
  # Usage: docker-compose -f docker-compose.prod.yml up -d prisma-studio
  # Access at: http://localhost:5555 (or your server IP:5555)
  # Security: Consider restricting access via firewall or nginx
  # prisma-studio:
  #   image: century-padel-backend:latest
  #   container_name: century-padel-prisma-studio-prod
  #   restart: "no"  # Don't auto-restart, start manually when needed
  #   working_dir: /app
  #   env_file:
  #     - .env.production
  #   environment:
  #     NODE_ENV: production
  #     DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/${DB_NAME:-century_padel}?schema=public
  #   ports:
  #     - '${PRISMA_STUDIO_PORT:-5555}:5555'
  #   volumes:
  #     # Mount prisma directory for schema access
  #     - ./prisma:/app/prisma:ro
  #     # Mount node_modules from the image (already installed)
  #     - /app/node_modules
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   networks:
  #     - century-padel-network
  #   command: ['bunx', 'prisma', 'studio', '--port', '5555', '--browser', 'none']
  #   logging:
  #     driver: 'json-file'
  #     options:
  #       max-size: '10m'
  #       max-file: '3'
  #   security_opt:
  #     - no-new-privileges:true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_storage:
    driver: local
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local

networks:
  century-padel-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
