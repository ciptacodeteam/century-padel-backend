# Docker Compose override for ngrok development
# Usage: docker-compose -f docker-compose.yml -f docker-compose.ngrok.yml up -d

version: '3.9'

services:
  # Enhanced app service for ngrok development
  app:
    environment:
      - WEBHOOK_BASE_URL=http://host.docker.internal:8000/webhooks
    labels:
      - 'ngrok.enabled=true'
      - 'ngrok.port=8000'

  # Ngrok tunnel service
  ngrok:
    image: ngrok/ngrok:3-alpine
    container_name: ngrok-dev
    env_file:
      - .env
      - .env.local
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
      NGROK_DOMAIN: ${NGROK_DOMAIN:-}
    ports:
      - '4040:4040' # ngrok web interface
    volumes:
      - ./docker/ngrok-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./docker/get-ngrok-url.sh:/usr/local/bin/get-ngrok-url.sh:ro
    depends_on:
      app:
        condition: service_started
    networks:
      - quantum-sport-network
    restart: unless-stopped
    entrypoint: ['/bin/sh', '/docker-entrypoint.sh']
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:4040/api/tunnels',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - 'description=Ngrok tunnel for webhook testing'

  # Helper service to display ngrok URL
  ngrok-monitor:
    image: curlimages/curl:8.4.0
    container_name: ngrok-monitor
    volumes:
      - ./docker/get-ngrok-url.sh:/get-ngrok-url.sh:ro
    depends_on:
      ngrok:
        condition: service_healthy
    networks:
      - quantum-sport-network
    command: ['sh', '/get-ngrok-url.sh']
    restart: 'no'
    labels:
      - 'description=Displays ngrok URL for webhook configuration'
