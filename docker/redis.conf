# Redis configuration for production

# Network
# SECURITY: Only bind to internal Docker network, NOT publicly exposed
bind 127.0.0.1
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 60

# General
daemonize no
supervised no
# Changed pidfile path to /data where Redis has write permissions
pidfile /data/redis.pid
# Set loglevel to warning to catch security issues
loglevel warning
logfile ""

# Snapshotting
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Replication
# Note: This is a standalone Redis instance (not a replica)
# If you set up master-slave replication, uncomment these settings:
# replica-serve-stale-data yes
# replica-read-only yes
# repl-diskless-sync no
# repl-diskless-sync-delay 5
# repl-disable-tcp-nodelay no
# replica-priority 100

# Security
# CRITICAL: Set a strong password to prevent unauthorized access
# IMPORTANT: Generate a strong random password and add to .env.production
# Example: redis_password=$(openssl rand -base64 32)
# requirepass YOUR_STRONG_PASSWORD_HERE

# Additional security settings
# Disable dangerous commands (but not FLUSHALL as it conflicts with existing AOF)
rename-command FLUSHDB ""
rename-command CONFIG ""

# Append Only File (AOF)
# Performance fix: Use fsync less frequently to reduce disk I/O
appendonly yes
appendfilename "appendonly.aof"
# Changed from 'everysec' to 'no' to reduce disk I/O pressure
# This means fsync happens during bgrewriteaof, which is acceptable for BullMQ
appendfsync no
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# Memory Management
# Required for BullMQ - prevents job eviction
maxmemory 512mb
maxmemory-policy noeviction
maxmemory-samples 5

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Advanced config
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100
activerehashing yes
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60
hz 10
dynamic-hz yes
aof-rewrite-incremental-fsync yes
rdb-save-incremental-fsync yes
