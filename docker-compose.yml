services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: db
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      POSTGRES_DB: ${DB_NAME:-century_padel}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - century-padel-network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - century-padel-network
    command: redis-server --appendonly yes

  # Apply schema once before app/workers start (fresh DB has no tables)
  db-init:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: db-init
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-century_padel}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - century-padel-network
    entrypoint:
      - /bin/sh
      - -c
      - tr -d '\r' < /app/docker/dev-entrypoint.sh > /tmp/dev-entry.sh && exec sh /tmp/dev-entry.sh true
    restart: 'no'

  # Prisma Studio (Database GUI)
  prisma-studio:
    image: oven/bun:1.3-alpine
    container_name: prisma-studio
    working_dir: /app
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-century_padel}
    ports:
      - '5555:5555'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - century-padel-network
    command: >
      sh -c "bun install && bunx prisma studio"

  # Application Server
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: app
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      NODE_ENV: development
      PORT: 8000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-century_padel}
      REDIS_URL: redis://redis:6379
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - century-padel-network
    command: bun run dev

  # Email Queue Worker
  email-worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: email-worker
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-century_padel}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - century-padel-network
    command: bun run worker:email
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # Scheduler Worker (Transaction Expiry Checker)
  scheduler-worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: scheduler-worker
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-century_padel}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - century-padel-network
    command: bun run worker:scheduler
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # Ngrok Tunnel for Webhook Testing
  ngrok:
    image: ngrok/ngrok:3-alpine
    container_name: ngrok
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-replace}
      NGROK_DOMAIN: ${NGROK_DOMAIN:-}
    ports:
      - '4040:4040' # ngrok web interface
    depends_on:
      app:
        condition: service_started
    networks:
      - century-padel-network
    restart: unless-stopped
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        if [ -z "$$NGROK_AUTHTOKEN" ] || [ "$$NGROK_AUTHTOKEN" = "replace" ]; then
          echo "NGROK_AUTHTOKEN not set — idling (add token to .env to enable)"
          exec sleep infinity
        fi
        if [ -n "$$NGROK_DOMAIN" ] && [ "$$NGROK_DOMAIN" != "replace" ]; then
          cat > /tmp/ngrok.yml <<EOF
        version: "2"
        authtoken: $$NGROK_AUTHTOKEN
        web_addr: 0.0.0.0:4040
        tunnels:
          webhook:
            proto: http
            addr: app:8000
            hostname: $$NGROK_DOMAIN
        EOF
        else
          cat > /tmp/ngrok.yml <<EOF
        version: "2"
        authtoken: $$NGROK_AUTHTOKEN
        web_addr: 0.0.0.0:4040
        tunnels:
          webhook:
            proto: http
            addr: app:8000
        EOF
        fi
        exec ngrok start webhook --config /tmp/ngrok.yml --log stdout
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:4040/api/tunnels',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:

networks:
  century-padel-network:
    driver: bridge
