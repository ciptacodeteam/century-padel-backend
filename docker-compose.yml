version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: db
    env_file:
      - .env
      - .env.local
    environment:
      POSTGRES_DB: ${DB_NAME:-quantum_sport}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quantum-sport-network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quantum-sport-network
    command: redis-server --appendonly yes

  # Prisma Studio (Database GUI)
  prisma-studio:
    image: oven/bun:1.3-alpine
    container_name: prisma-studio
    working_dir: /app
    env_file:
      - .env
      - .env.local
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-quantum_sport}
    ports:
      - '5555:5555'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - quantum-sport-network
    command: >
      sh -c "bun install && bunx prisma studio"

  # Application Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app
    env_file:
      - .env
      - .env.local
    environment:
      NODE_ENV: development
      PORT: 8000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-quantum_sport}
      REDIS_URL: redis://redis:6379
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - quantum-sport-network
    command: bun run dev

  # Email Queue Worker
  email-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-worker
    env_file:
      - .env
      - .env.local
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-quantum_sport}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - quantum-sport-network
    command: bun run worker:email
    restart: unless-stopped
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # Ngrok Tunnel for Webhook Testing
  ngrok:
    image: ngrok/ngrok:3-alpine
    container_name: ngrok
    env_file:
      - .env
      - .env.local
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-replace}
      NGROK_DOMAIN: ${NGROK_DOMAIN:-}
    ports:
      - '4040:4040' # ngrok web interface
    volumes:
      - ./docker/ngrok-entrypoint.sh:/docker-entrypoint.sh
    depends_on:
      app:
        condition: service_started
    networks:
      - quantum-sport-network
    restart: unless-stopped
    entrypoint: ['/bin/sh', '/docker-entrypoint.sh']
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:4040/api/tunnels',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:

networks:
  quantum-sport-network:
    driver: bridge
