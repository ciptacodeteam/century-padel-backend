name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          SSH_KEY_B64: ${{ secrets.DO_SSH_PRIVATE_KEY_B64 }}
        run: |
          install -m 700 -d ~/.ssh
          if [ -n "$SSH_KEY_B64" ]; then
            echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          else
            printf '%s\n' "$SSH_KEY" | sed 's/\r$//' > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "❌ Invalid SSH private key in GitHub secret."
            echo "   Fix DO_SSH_PRIVATE_KEY or set DO_SSH_PRIVATE_KEY_B64 (recommended on Windows)."
            exit 1
          fi
          echo "Deploy key fingerprint (must match VPS authorized_keys):"
          ssh-keygen -lf ~/.ssh/deploy_key

      - name: Add Known Hosts
        run: ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to DigitalOcean Droplet
        run: |
          SSH_OPTS="-i $HOME/.ssh/deploy_key -o IdentitiesOnly=yes -o PreferredAuthentications=publickey -o StrictHostKeyChecking=yes"
          ssh $SSH_OPTS -p ${{ secrets.DO_SSH_PORT }} ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }} << 'EOF'
          set -e
          cd ${{ secrets.DO_PROJECT_PATH }}
          git pull origin main
          chmod +x scripts/*.sh scripts/lib/*.sh deploy.sh docker/*.sh 2>/dev/null || true
          AUTO_DEPLOY=true bash scripts/update.sh
          EOF

      - name: Deployment Status
        if: success()
        run: echo "✅ Deployment completed successfully!"

      - name: Deployment Failed
        if: failure()
        run: echo "❌ Deployment failed. Check the logs above."
